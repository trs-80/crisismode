apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-spoke
  labels:
    {{- include "crisismode-spoke.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webhook.service.type }}
  ports:
    - port: {{ .Values.webhook.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "crisismode-spoke.selectorLabels" . | nindent 4 }}
