# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all platform binaries
        run: bash scripts/build-binary.sh --all

      - name: Generate checksums
        run: |
          cd dist
          for bin in crisismode-linux-x64 crisismode-linux-arm64 crisismode-darwin-x64 crisismode-darwin-arm64; do
            sha256sum "$bin" > "${bin}.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            dist/crisismode-linux-x64
            dist/crisismode-linux-x64.sha256
            dist/crisismode-linux-arm64
            dist/crisismode-linux-arm64.sha256
            dist/crisismode-darwin-x64
            dist/crisismode-darwin-x64.sha256
            dist/crisismode-darwin-arm64
            dist/crisismode-darwin-arm64.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "CrisisMode ${{ github.ref_name }}" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-v:refname | sed -n '2p')" \
            release/*

          # Prepend install instructions to the generated notes
          EXISTING_NOTES=$(gh release view "${{ github.ref_name }}" --json body --jq .body)
          printf '%s\n' '## Install' '' '**Linux:**' '```bash' \
            'curl -fsSL https://github.com/trs-80/crisismode/releases/latest/download/crisismode-linux-x64 -o crisismode' \
            'chmod +x crisismode' './crisismode scan' '```' '' \
            '**macOS:**' '```bash' \
            'curl -fsSL https://github.com/trs-80/crisismode/releases/latest/download/crisismode-darwin-arm64 -o crisismode' \
            'chmod +x crisismode' 'xattr -cr crisismode   # remove macOS quarantine flag' \
            './crisismode scan' '```' '' '---' > /tmp/release-notes.md
          printf '%s' "$EXISTING_NOTES" >> /tmp/release-notes.md
          gh release edit "${{ github.ref_name }}" --notes-file /tmp/release-notes.md
