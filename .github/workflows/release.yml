# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-latest
            platform: darwin
            arch: arm64
          - runner: macos-15
            platform: darwin
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build binary
        run: OUTPUT_NAME=crisismode-${{ matrix.platform }}-${{ matrix.arch }} bash scripts/build-binary.sh

      - name: Generate checksum
        run: |
          cd dist
          shasum -a 256 crisismode-${{ matrix.platform }}-${{ matrix.arch }} > crisismode-${{ matrix.platform }}-${{ matrix.arch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crisismode-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/crisismode-${{ matrix.platform }}-${{ matrix.arch }}
            dist/crisismode-${{ matrix.platform }}-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "CrisisMode ${{ github.ref_name }}" \
            --generate-notes \
            release/*
