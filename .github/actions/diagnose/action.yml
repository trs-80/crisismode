name: 'CrisisMode Diagnose'
description: 'Run CrisisMode health scan and diagnosis, posting results as a PR/commit comment'
author: 'CrisisMode Contributors'

branding:
  icon: 'activity'
  color: 'red'

inputs:
  config-path:
    description: 'Path to crisismode.yaml config file'
    required: false
    default: ''
  category:
    description: 'Comma-separated list of agent categories to scan (e.g., postgresql,redis)'
    required: false
    default: ''
  comment-on:
    description: 'Where to post results: "pr" (pull request), "commit" (commit SHA), or "none"'
    required: false
    default: 'pr'
  github-token:
    description: 'GitHub token for posting comments (defaults to GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}
  anthropic-api-key:
    description: 'Anthropic API key for AI-powered diagnosis (optional)'
    required: false
    default: ''
  fail-on-unhealthy:
    description: 'Fail the action if any service is unhealthy'
    required: false
    default: 'false'
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

outputs:
  health-score:
    description: 'Overall health score (0-100)'
    value: ${{ steps.diagnose.outputs.health-score }}
  status:
    description: 'Overall health status (healthy, recovering, unhealthy, unknown)'
    value: ${{ steps.diagnose.outputs.status }}
  findings-count:
    description: 'Number of findings'
    value: ${{ steps.diagnose.outputs.findings-count }}
  report:
    description: 'Full diagnosis report in markdown'
    value: ${{ steps.diagnose.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install CrisisMode
      shell: bash
      run: npm install -g crisismode

    - name: Run Diagnosis
      id: diagnose
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        # Build command
        CMD="crisismode scan --json"

        if [ -n "${{ inputs.config-path }}" ]; then
          CMD="$CMD --config ${{ inputs.config-path }}"
        fi

        if [ -n "${{ inputs.category }}" ]; then
          CMD="$CMD --category ${{ inputs.category }}"
        fi

        if [ "${{ inputs.verbose }}" = "true" ]; then
          CMD="$CMD --verbose"
        fi

        echo "Running: $CMD"

        # Run scan and capture output
        SCAN_OUTPUT=$($CMD 2>&1) || true
        echo "scan-output<<CRISISMODE_EOF" >> "$GITHUB_OUTPUT"
        echo "$SCAN_OUTPUT" >> "$GITHUB_OUTPUT"
        echo "CRISISMODE_EOF" >> "$GITHUB_OUTPUT"

        # Parse JSON output for structured data
        HEALTH_SCORE=$(echo "$SCAN_OUTPUT" | jq -r '.score // 100' 2>/dev/null || echo "100")
        STATUS=$(echo "$SCAN_OUTPUT" | jq -r '.findings[0].status // "unknown"' 2>/dev/null || echo "unknown")
        FINDINGS_COUNT=$(echo "$SCAN_OUTPUT" | jq -r '.findings | length' 2>/dev/null || echo "0")

        echo "health-score=$HEALTH_SCORE" >> "$GITHUB_OUTPUT"
        echo "status=$STATUS" >> "$GITHUB_OUTPUT"
        echo "findings-count=$FINDINGS_COUNT" >> "$GITHUB_OUTPUT"

        # Build markdown report
        REPORT="## CrisisMode Health Report"$'\n\n'
        REPORT+="**Health Score:** ${HEALTH_SCORE}/100"$'\n'
        REPORT+="**Findings:** ${FINDINGS_COUNT}"$'\n\n'

        if [ "$FINDINGS_COUNT" -gt 0 ] 2>/dev/null; then
          REPORT+="### Findings"$'\n\n'
          REPORT+="| Service | Status | Summary |"$'\n'
          REPORT+="|---------|--------|---------|"$'\n'
          REPORT+=$(echo "$SCAN_OUTPUT" | jq -r '.findings[]? | "| \(.service) | \(.status) | \(.summary) |"' 2>/dev/null || echo "")
          REPORT+=$'\n'
        fi

        REPORT+=$'\n'"---"$'\n'
        REPORT+="*Generated by [CrisisMode](https://crisismode.ai) diagnose action*"

        echo "report<<CRISISMODE_REPORT_EOF" >> "$GITHUB_OUTPUT"
        echo "$REPORT" >> "$GITHUB_OUTPUT"
        echo "CRISISMODE_REPORT_EOF" >> "$GITHUB_OUTPUT"

    - name: Comment on PR
      if: inputs.comment-on == 'pr' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        # Check for existing CrisisMode comment and update or create
        EXISTING_COMMENT=$(gh api \
          repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          --jq '.[] | select(.body | contains("CrisisMode Health Report")) | .id' \
          2>/dev/null | head -1 || echo "")

        BODY="${{ steps.diagnose.outputs.report }}"

        if [ -n "$EXISTING_COMMENT" ]; then
          gh api \
            repos/${{ github.repository }}/issues/comments/$EXISTING_COMMENT \
            -X PATCH \
            -f body="$BODY"
          echo "Updated existing CrisisMode comment"
        else
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$BODY"
          echo "Created new CrisisMode comment"
        fi

    - name: Comment on Commit
      if: inputs.comment-on == 'commit' && github.event_name == 'push'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh api \
          repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
          -f body="${{ steps.diagnose.outputs.report }}"
        echo "Posted CrisisMode comment on commit ${{ github.sha }}"

    - name: Check Health Threshold
      if: inputs.fail-on-unhealthy == 'true'
      shell: bash
      run: |
        SCORE="${{ steps.diagnose.outputs.health-score }}"
        if [ "$SCORE" -lt 50 ] 2>/dev/null; then
          echo "::error::CrisisMode health score is $SCORE/100 — below threshold"
          exit 1
        fi
